# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:
  conan-generate:
    desc: Generate project Requirements
    cmd: conan install . --output-folder=generated --build=missing

  conan-profile:
    desc: Generate project profile
    cmd: conan profile detect --force

  build:
    desc: Build Project files
    cmds:
      - task: conan-profile
      - task: conan-generate
